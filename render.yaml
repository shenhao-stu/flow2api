# render.yaml — Render Blueprint for flow2api with Neon PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
# Deployment modes:
#
#   Mode A (recommended, zero-cost storage):
#     Set DATABASE_URL → app uses Neon PostgreSQL, no disk needed.
#
#   Mode B (SQLite with disk):
#     Do NOT set DATABASE_URL; add a Render Disk at /app/data.
#     Requires Render Starter plan ($7/mo) for disk support.
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: flow2api
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .

    # ── Mode A: PostgreSQL (Neon) — no disk required ──────────────────────
    # Remove the `disk` section below to use this mode.
    # ── Mode B: SQLite with persistent disk ───────────────────────────────
    # Uncomment to enable (requires Render Starter plan or higher):
    # disk:
    #   name: flow2api-data
    #   mountPath: /app/data
    #   sizeGB: 1

    envVars:
      # ── Database (Mode A: set this to use Neon PostgreSQL) ────────────────
      - key: DATABASE_URL
        sync: false   # paste your Neon URL here in the Render dashboard
                      # Format: postgresql://user:pass@host/dbname?sslmode=require
                      # Remove the &channel_binding=require part if present

      # ── Application credentials ───────────────────────────────────────────
      - key: FLOW2API_API_KEY
        sync: false

      - key: FLOW2API_ADMIN_USERNAME
        value: admin

      - key: FLOW2API_ADMIN_PASSWORD
        sync: false

      # ── Captcha (REQUIRED: browser/personal won't work on Render) ─────────
      # Choose one of: yescaptcha / capmonster / ezcaptcha / capsolver / remote_browser
      - key: FLOW2API_CAPTCHA_METHOD
        value: yescaptcha

      - key: FLOW2API_YESCAPTCHA_API_KEY
        sync: false

      # ── Runtime ───────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
